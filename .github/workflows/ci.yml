name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install API dependencies
        run: cd api && npm install

      - name: Verify shared module loads
        run: cd api && node -e "const s = require('./shared'); console.log('✅ Shared module OK, tickers:', s.TICKERS.length)"

      - name: Verify frontend exists
        run: |
          test -f public/index.html && echo "✅ Frontend OK"
          test -f staticwebapp.config.json && echo "✅ SWA config OK"
