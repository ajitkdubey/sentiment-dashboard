name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install API dependencies
        run: cd api && npm install

      - name: Verify API module loads
        run: cd api && node -e "const s = require('./shared'); console.log('✅ Shared module OK, tickers:', s.TICKERS.length)"

      - name: Verify function config
        run: |
          test -f api/data/function.json && echo "✅ Function config OK"
          test -f api/host.json && echo "✅ Host config OK"

      - name: Verify frontend
        run: |
          test -f public/index.html && echo "✅ Frontend OK"
          grep -q "OpenEXA Sentiment Dashboard" public/index.html && echo "✅ Title OK"
