<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenEXA Sentiment Dashboard</title>
  <style>
    :root {
      --bg: #0a0e17;
      --card: #111827;
      --border: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --green: #10b981;
      --red: #ef4444;
      --blue: #3b82f6;
      --yellow: #f59e0b;
      --purple: #8b5cf6;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #111827 0%, #1a1f35 100%);
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 {
      font-size: 22px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .last-update { color: var(--muted); font-size: 13px; }
    .refresh-btn {
      background: var(--blue);
      border: none;
      color: white;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
    }
    .refresh-btn:hover { background: #2563eb; }
    .refresh-btn:disabled { opacity: 0.5; cursor: wait; }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      padding: 16px 32px 0;
      border-bottom: 1px solid var(--border);
    }
    .tab {
      padding: 10px 20px;
      border: none;
      background: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--blue); border-bottom-color: var(--blue); }

    /* Summary strip */
    .summary-strip {
      display: flex;
      gap: 12px;
      padding: 20px 32px;
      overflow-x: auto;
    }
    .summary-card {
      flex: 0 0 auto;
      min-width: 140px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .summary-card:hover { border-color: var(--blue); transform: translateY(-2px); }
    .summary-card.selected { border-color: var(--blue); background: #1a2332; }
    .summary-symbol { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
    .summary-price { font-size: 18px; font-weight: 600; }
    .summary-change { font-size: 13px; margin-top: 2px; }
    .summary-sentiment {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      margin-top: 6px;
    }
    .sentiment-Bullish { background: rgba(16,185,129,0.15); color: var(--green); }
    .sentiment-Bearish { background: rgba(239,68,68,0.15); color: var(--red); }
    .sentiment-Neutral { background: rgba(245,158,11,0.15); color: var(--yellow); }
    .sentiment-NA { background: rgba(156,163,175,0.1); color: var(--muted); }

    /* Main grid */
    .main { padding: 0 32px 32px; }

    /* Overview grid */
    .overview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
      margin-top: 20px;
    }
    .ticker-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      transition: all 0.2s;
    }
    .ticker-card:hover { border-color: #374151; }
    .ticker-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    .ticker-name { font-size: 20px; font-weight: 700; }
    .ticker-price { font-size: 24px; font-weight: 700; }
    .ticker-change { font-size: 14px; }
    .positive { color: var(--green); }
    .negative { color: var(--red); }

    /* Sentiment meter */
    .sentiment-meter {
      margin: 12px 0;
      padding: 12px;
      background: rgba(255,255,255,0.03);
      border-radius: 8px;
    }
    .meter-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .meter-bar-bg {
      height: 8px;
      background: #1f2937;
      border-radius: 4px;
      position: relative;
      overflow: hidden;
    }
    .meter-bar {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
    }
    .meter-value {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-top: 4px;
    }

    /* News list */
    .news-section { margin-top: 12px; }
    .news-section h3 {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .news-item {
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .news-item:last-child { border-bottom: none; }
    .news-item a {
      color: var(--text);
      text-decoration: none;
      font-size: 13px;
      line-height: 1.4;
      display: block;
    }
    .news-item a:hover { color: var(--blue); }
    .news-meta {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 4px;
      font-size: 11px;
      color: var(--muted);
    }
    .news-sentiment-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    /* Heatmap */
    .heatmap-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 8px;
      margin-top: 20px;
    }
    .heat-cell {
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      transition: all 0.2s;
      cursor: default;
    }
    .heat-cell:hover { transform: scale(1.03); }
    .heat-symbol { font-size: 18px; font-weight: 700; }
    .heat-score { font-size: 28px; font-weight: 800; margin: 4px 0; }
    .heat-label { font-size: 12px; opacity: 0.8; }

    /* Detail panel */
    .detail-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-top: 20px;
    }
    .detail-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .detail-title { font-size: 28px; font-weight: 700; }
    .detail-stats {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat-box {
      background: rgba(255,255,255,0.03);
      padding: 12px;
      border-radius: 8px;
    }
    .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; }
    .stat-value { font-size: 18px; font-weight: 600; margin-top: 4px; }

    /* News table (detail) */
    .news-table { width: 100%; border-collapse: collapse; margin-top: 16px; }
    .news-table th {
      text-align: left;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }
    .news-table td {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 13px;
    }
    .news-table a { color: var(--text); text-decoration: none; }
    .news-table a:hover { color: var(--blue); }

    /* Loading */
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 400px;
      font-size: 18px;
      color: var(--muted);
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Ticker Manager Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      width: 420px;
      max-width: 90vw;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
    }
    .modal-header h2 { font-size: 17px; font-weight: 600; }
    .modal-close-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
    }
    .modal-close-btn:hover { color: var(--text); background: rgba(255,255,255,0.05); }
    .modal-body { padding: 16px 20px; overflow-y: auto; flex: 1; }
    .ticker-add-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .ticker-add-row input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 14px;
      text-transform: uppercase;
    }
    .ticker-add-row input::placeholder { color: var(--muted); text-transform: none; }
    .ticker-add-row input:focus { outline: none; border-color: var(--blue); }
    .ticker-add-btn {
      background: var(--blue);
      border: none;
      color: white;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }
    .ticker-add-btn:hover { background: #2563eb; }
    .ticker-feedback {
      font-size: 12px;
      margin-bottom: 8px;
      min-height: 18px;
    }
    .ticker-feedback.success { color: var(--green); }
    .ticker-feedback.error { color: var(--red); }
    .ticker-list { display: flex; flex-direction: column; gap: 4px; }
    .ticker-list-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: rgba(255,255,255,0.03);
      border-radius: 6px;
    }
    .ticker-list-symbol { font-weight: 600; font-size: 14px; }
    .ticker-list-badge {
      font-size: 11px;
      color: var(--muted);
    }
    .ticker-remove-btn {
      background: none;
      border: none;
      color: var(--red);
      cursor: pointer;
      font-size: 16px;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .ticker-remove-btn:hover { background: rgba(239,68,68,0.15); }
    .manage-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
    }
    .manage-btn:hover { border-color: var(--blue); color: var(--blue); }

    /* Responsive */
    @media (max-width: 768px) {
      .header { padding: 16px; }
      .tabs { padding: 12px 16px 0; }
      .summary-strip { padding: 16px; }
      .main { padding: 0 16px 16px; }
      .overview-grid { grid-template-columns: 1fr; }
      .modal { width: 95vw; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>⚡ OpenEXA Sentiment Dashboard</h1>
    <div class="header-right">
      <span class="last-update" id="lastUpdate">Loading...</span>
      <button class="manage-btn" id="manageTickersBtn" onclick="App.toggleTickerManager()">⚙️ Manage Tickers</button>
      <button class="refresh-btn" id="refreshBtn" onclick="doRefresh()">↻ Refresh</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="overview">Overview</button>
    <button class="tab" data-tab="heatmap">Sentiment Heatmap</button>
    <button class="tab" data-tab="news">All News</button>
  </div>

  <div class="summary-strip" id="summaryStrip"></div>

  <div class="main" id="mainContent">
    <div class="loading"><div class="spinner"></div> Loading data...</div>
  </div>

  <!-- Ticker Manager Modal -->
  <div class="modal-overlay" id="tickerManagerModal">
    <div class="modal">
      <div class="modal-header">
        <h2>⚙️ Manage Tickers</h2>
        <button class="modal-close-btn" onclick="App.toggleTickerManager()">✕</button>
      </div>
      <div class="modal-body">
        <div class="ticker-add-row">
          <input type="text" id="tickerInput" placeholder="Enter ticker symbol..." maxlength="20" />
          <button class="ticker-add-btn" onclick="App.handleAddTicker()">Add</button>
        </div>
        <div class="ticker-feedback" id="tickerFeedback"></div>
        <div id="tickerManagerContent"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    let DATA = null;
    let currentTab = "overview";
    let selectedTicker = null;

    // ── Bridge: expose loadData globally so app.js can call it ──
    // app.js addCustomTicker/removeCustomTicker call loadData()
    // We define it here and register it on window for app.js to access

    // ── Custom tickers helper ──
    function getCustomTickerParam() {
      const custom = (typeof App !== 'undefined' && App.getCustomTickers) ? App.getCustomTickers() : [];
      return custom.length ? '?tickers=' + custom.join(',') : '';
    }

    // ── Fetch ──
    async function loadData() {
      try {
        const param = getCustomTickerParam();
        const res = await fetch("/api/data" + param);
        DATA = await res.json();
        // Handle Azure Functions wrapper (body may be stringified)
        if (typeof DATA === "string") DATA = JSON.parse(DATA);
        document.getElementById("lastUpdate").textContent =
          DATA.lastUpdate ? `Updated: ${new Date(DATA.lastUpdate).toLocaleTimeString()}` : "";
        renderSummary();
        renderTab();
      } catch (e) {
        document.getElementById("mainContent").innerHTML =
          `<div class="loading">Error loading data: ${e.message}</div>`;
      }
    }
    // Make loadData available globally for app.js
    window.loadData = loadData;

    async function doRefresh() {
      const btn = document.getElementById("refreshBtn");
      btn.disabled = true;
      btn.textContent = "Refreshing...";
      try {
        const param = getCustomTickerParam();
        const sep = param ? '&' : '?';
        await fetch("/api/data" + param + (param ? '&' : '?') + "refresh=true");
        await loadData();
      } finally {
        btn.disabled = false;
        btn.textContent = "↻ Refresh";
      }
    }

    // ── Summary strip ──
    function renderSummary() {
      const strip = document.getElementById("summaryStrip");
      const tickers = Object.keys(DATA.quotes);
      strip.innerHTML = tickers.map(t => {
        const q = DATA.quotes[t];
        const n = DATA.news[t];
        const sentLabel = n?.aggregate?.label || "N/A";
        const changeClass = (q.change || 0) >= 0 ? "positive" : "negative";
        const sign = (q.change || 0) >= 0 ? "+" : "";
        return `
          <div class="summary-card ${selectedTicker === t ? 'selected' : ''}" onclick="selectTicker('${t}')">
            <div class="summary-symbol">${t}</div>
            <div class="summary-price">${q.price != null ? '$' + q.price.toFixed(2) : 'N/A'}</div>
            <div class="summary-change ${changeClass}">
              ${q.changePercent != null ? sign + q.changePercent.toFixed(2) + '%' : ''}
            </div>
            <span class="summary-sentiment sentiment-${sentLabel.replace('/','-')}">${sentLabel}</span>
          </div>`;
      }).join("");
    }

    function selectTicker(t) {
      selectedTicker = selectedTicker === t ? null : t;
      renderSummary();
      renderTab();
    }

    // ── Tabs ──
    document.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        currentTab = tab.dataset.tab;
        selectedTicker = null;
        renderSummary();
        renderTab();
      });
    });

    function renderTab() {
      if (!DATA) return;
      const main = document.getElementById("mainContent");

      if (selectedTicker) {
        main.innerHTML = renderDetail(selectedTicker);
        return;
      }

      switch (currentTab) {
        case "overview": main.innerHTML = renderOverview(); break;
        case "heatmap": main.innerHTML = renderHeatmap(); break;
        case "news": main.innerHTML = renderAllNews(); break;
      }
    }

    // ── Overview ──
    function renderOverview() {
      const tickers = Object.keys(DATA.quotes);
      return `<div class="overview-grid">${tickers.map(t => renderTickerCard(t)).join("")}</div>`;
    }

    function renderTickerCard(t) {
      const q = DATA.quotes[t];
      const n = DATA.news[t];
      const changeClass = (q.change || 0) >= 0 ? "positive" : "negative";
      const sign = (q.change || 0) >= 0 ? "+" : "";
      const sentLabel = n?.aggregate?.label || "N/A";
      const sentScore = n?.aggregate?.avgScore || 0;

      // Meter: -5 to +5 mapped to 0-100%
      const meterPct = Math.max(0, Math.min(100, ((sentScore + 5) / 10) * 100));
      const meterColor = sentScore > 1 ? "var(--green)" : sentScore < -1 ? "var(--red)" : "var(--yellow)";

      const topNews = (n?.articles || []).slice(0, 3);

      return `
        <div class="ticker-card">
          <div class="ticker-header">
            <div>
              <div class="ticker-name">${t}</div>
              <div class="ticker-change ${changeClass}">
                ${q.change != null ? sign + q.change.toFixed(2) : ''} 
                (${q.changePercent != null ? sign + q.changePercent.toFixed(2) + '%' : 'N/A'})
              </div>
            </div>
            <div class="ticker-price">${q.price != null ? '$' + q.price.toFixed(2) : 'N/A'}</div>
          </div>
          <div class="sentiment-meter">
            <div class="meter-label">Sentiment Score</div>
            <div class="meter-bar-bg">
              <div class="meter-bar" style="width:${meterPct}%;background:${meterColor}"></div>
            </div>
            <div class="meter-value">
              <span>Bearish</span>
              <span class="sentiment-${sentLabel}">${sentLabel} (${sentScore})</span>
              <span>Bullish</span>
            </div>
          </div>
          ${topNews.length ? `
            <div class="news-section">
              <h3>Latest News</h3>
              ${topNews.map(a => `
                <div class="news-item">
                  <a href="${a.link}" target="_blank">${a.title}</a>
                  <div class="news-meta">
                    <span class="news-sentiment-dot" style="background:${sentColor(a.sentiment.label)}"></span>
                    ${a.sentiment.label} · ${timeAgo(a.pubDate)}
                  </div>
                </div>`).join("")}
            </div>` : ''}
        </div>`;
    }

    // ── Heatmap ──
    function renderHeatmap() {
      const tickers = Object.keys(DATA.news);
      return `<div class="heatmap-grid">${tickers.map(t => {
        const n = DATA.news[t];
        const score = n?.aggregate?.avgScore || 0;
        const label = n?.aggregate?.label || "N/A";
        const bg = heatBg(score);
        return `
          <div class="heat-cell" style="background:${bg}" onclick="selectTicker('${t}')">
            <div class="heat-symbol">${t}</div>
            <div class="heat-score">${score > 0 ? '+' : ''}${score}</div>
            <div class="heat-label">${label} · ${n?.aggregate?.articleCount || 0} articles</div>
          </div>`;
      }).join("")}</div>`;
    }

    function heatBg(score) {
      if (score > 2) return "rgba(16,185,129,0.3)";
      if (score > 0.5) return "rgba(16,185,129,0.15)";
      if (score < -2) return "rgba(239,68,68,0.3)";
      if (score < -0.5) return "rgba(239,68,68,0.15)";
      return "rgba(245,158,11,0.1)";
    }

    // ── All News ──
    function renderAllNews() {
      const allArticles = [];
      Object.keys(DATA.news).forEach(t => {
        (DATA.news[t]?.articles || []).forEach(a => {
          allArticles.push({ ...a, ticker: t });
        });
      });
      allArticles.sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));

      return `
        <div class="detail-panel">
          <h2 style="margin-bottom:16px">All News (${allArticles.length} articles)</h2>
          <table class="news-table">
            <thead>
              <tr><th>Ticker</th><th>Headline</th><th>Sentiment</th><th>Time</th></tr>
            </thead>
            <tbody>
              ${allArticles.map(a => `
                <tr>
                  <td><strong>${a.ticker}</strong></td>
                  <td><a href="${a.link}" target="_blank">${a.title}</a></td>
                  <td>
                    <span class="news-sentiment-dot" style="background:${sentColor(a.sentiment.label)}"></span>
                    ${a.sentiment.label} (${a.sentiment.score})
                  </td>
                  <td>${timeAgo(a.pubDate)}</td>
                </tr>`).join("")}
            </tbody>
          </table>
        </div>`;
    }

    // ── Detail view ──
    function renderDetail(t) {
      const q = DATA.quotes[t] || {};
      const n = DATA.news[t] || {};
      const changeClass = (q.change || 0) >= 0 ? "positive" : "negative";
      const sign = (q.change || 0) >= 0 ? "+" : "";

      return `
        <div class="detail-panel">
          <div class="detail-header">
            <div>
              <div class="detail-title">${t}</div>
              <div class="ticker-change ${changeClass}" style="font-size:16px">
                $${q.price?.toFixed(2) || 'N/A'} · ${sign}${q.changePercent?.toFixed(2) || 0}%
              </div>
            </div>
            <span class="summary-sentiment sentiment-${(n.aggregate?.label||'N/A').replace('/','-')}" style="font-size:16px;padding:6px 16px">
              ${n.aggregate?.label || 'N/A'} (score: ${n.aggregate?.avgScore || 0})
            </span>
          </div>

          <div class="detail-stats">
            <div class="stat-box"><div class="stat-label">Day High</div><div class="stat-value">$${q.dayHigh?.toFixed(2) || 'N/A'}</div></div>
            <div class="stat-box"><div class="stat-label">Day Low</div><div class="stat-value">$${q.dayLow?.toFixed(2) || 'N/A'}</div></div>
            <div class="stat-box"><div class="stat-label">Prev Close</div><div class="stat-value">$${q.prevClose?.toFixed(2) || 'N/A'}</div></div>
            <div class="stat-box"><div class="stat-label">Volume</div><div class="stat-value">${formatNum(q.volume)}</div></div>
            <div class="stat-box"><div class="stat-label">Market Cap</div><div class="stat-value">${formatNum(q.marketCap)}</div></div>
            <div class="stat-box"><div class="stat-label">50D Avg</div><div class="stat-value">$${q.fiftyDayAvg?.toFixed(2) || 'N/A'}</div></div>
            <div class="stat-box"><div class="stat-label">200D Avg</div><div class="stat-value">$${q.twoHundredDayAvg?.toFixed(2) || 'N/A'}</div></div>
            <div class="stat-box"><div class="stat-label">Articles</div><div class="stat-value">${n.aggregate?.articleCount || 0}</div></div>
          </div>

          <h3 style="margin:16px 0 8px;font-size:14px;color:var(--muted)">NEWS & SENTIMENT</h3>
          <table class="news-table">
            <thead><tr><th>Headline</th><th>Sentiment</th><th>Score</th><th>Time</th></tr></thead>
            <tbody>
              ${(n.articles || []).map(a => `
                <tr>
                  <td><a href="${a.link}" target="_blank">${a.title}</a></td>
                  <td><span class="news-sentiment-dot" style="background:${sentColor(a.sentiment.label)}"></span> ${a.sentiment.label}</td>
                  <td>${a.sentiment.score}</td>
                  <td>${timeAgo(a.pubDate)}</td>
                </tr>`).join("")}
            </tbody>
          </table>
        </div>`;
    }

    // ── Helpers ──
    function sentColor(label) {
      if (label === "Bullish") return "var(--green)";
      if (label === "Bearish") return "var(--red)";
      return "var(--yellow)";
    }

    function timeAgo(dateStr) {
      if (!dateStr) return "";
      const diff = Date.now() - new Date(dateStr).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `${hrs}h ago`;
      return `${Math.floor(hrs / 24)}d ago`;
    }

    function formatNum(n) {
      if (n == null) return "N/A";
      if (n >= 1e12) return (n / 1e12).toFixed(1) + "T";
      if (n >= 1e9) return (n / 1e9).toFixed(1) + "B";
      if (n >= 1e6) return (n / 1e6).toFixed(1) + "M";
      if (n >= 1e3) return (n / 1e3).toFixed(1) + "K";
      return n.toString();
    }

    // ── Init ──
    loadData();
    // Auto-refresh UI every 5 minutes
    setInterval(loadData, 5 * 60 * 1000);
  </script>
</body>
</html>
